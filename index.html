<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Mother’s Day</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(255, 196, 214, 0.8), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 219, 140, 0.7), transparent 35%),
        linear-gradient(135deg, #fff4ec, #ffd6e7, #fff8dc);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
      color: #6b3048;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle, rgba(255, 255, 255, 0.55) 0 2px, transparent 3px);
      background-size: 70px 70px;
      animation: glowMove 10s linear infinite;
      pointer-events: none;
    }

    @keyframes glowMove {
      from {
        background-position: 0 0;
      }

      to {
        background-position: 70px 70px;
      }
    }

    .page {
      width: 100%;
      max-width: 980px;
      min-height: 620px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 1.4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      width: 100%;
      max-width: 850px;
      padding: 55px 35px;
      text-align: center;
      border-radius: 35px;
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow:
        0 25px 80px rgba(170, 70, 110, 0.25),
        inset 0 0 35px rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
      z-index: 2;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255, 215, 140, 0.55), transparent 70%);
      top: -90px;
      right: -80px;
      border-radius: 50%;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255, 130, 180, 0.35), transparent 70%);
      bottom: -100px;
      left: -80px;
      border-radius: 50%;
    }

    .content {
      position: relative;
      z-index: 3;
    }

    .badge {
      display: inline-block;
      padding: 10px 22px;
      margin-bottom: 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.5);
      color: #a86623;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 8px 22px rgba(166, 102, 35, 0.15);
    }

    h1 {
      font-size: clamp(2.7rem, 7vw, 5.5rem);
      line-height: 1;
      color: #b73569;
      text-shadow: 0 5px 20px rgba(255, 120, 170, 0.35);
      margin-bottom: 18px;
    }

    .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: #7f4b5f;
      margin-bottom: 38px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin-bottom: 35px;
    }

    .time-box {
      padding: 25px 12px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 12px 35px rgba(173, 70, 115, 0.18);
      transition: 0.3s ease;
    }

    .time-box:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 45px rgba(173, 70, 115, 0.25);
    }

    .time-box span {
      display: block;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      color: #d0447c;
    }

    .time-box small {
      font-size: 0.9rem;
      color: #9a6940;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-weight: 700;
    }



    @keyframes pop {
      0% {
        transform: scale(0.92);
      }

      60% {
        transform: scale(1.03);
      }

      100% {
        transform: scale(1);
      }
    }



    .floating {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      animation: floatUp linear infinite;
      opacity: 0.75;
      filter: drop-shadow(0 8px 12px rgba(180, 60, 110, 0.25));
    }

    @keyframes floatUp {
      from {
        transform: translateY(110vh) rotate(0deg);
        opacity: 0;
      }

      15% {
        opacity: 0.8;
      }

      85% {
        opacity: 0.8;
      }

      to {
        transform: translateY(-15vh) rotate(360deg);
        opacity: 0;
      }
    }

    .sparkle {
      position: fixed;
      width: 7px;
      height: 7px;
      background: #ffd36a;
      border-radius: 50%;
      box-shadow: 0 0 15px #ffd36a;
      animation: sparkle 3s infinite ease-in-out;
      z-index: 1;
    }

    @keyframes sparkle {

      0%,
      100% {
        transform: scale(0.4);
        opacity: 0.3;
      }

      50% {
        transform: scale(1.3);
        opacity: 1;
      }
    }

    @media (max-width: 720px) {
      .card {
        padding: 42px 20px;
        border-radius: 28px;
      }

      .countdown {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }

      .time-box {
        padding: 22px 8px;
      }
    }

    @media (max-width: 390px) {
      .countdown {
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="card">
      <div class="content">
        <div class="badge">May 10, 2026</div>

        <h1>Happy Mother’s Day</h1>

        <p class="subtitle">
          Counting down to a special day filled with love
        </p>

        <section class="countdown">
          <div class="time-box">
            <span id="days">00</span>
            <small>Days</small>
          </div>

          <div class="time-box">
            <span id="hours">00</span>
            <small>Hours</small>
          </div>

          <div class="time-box">
            <span id="minutes">00</span>
            <small>Minutes</small>
          </div>

          <div class="time-box">
            <span id="seconds">00</span>
            <small>Seconds</small>
          </div>
        </section>

      </div>
  </div>
  </main>
  </div>


  <script src="src/js/countdown.js">

  </script>
</body>

</html>
